body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:15px;min-height:100vh}

.ti{font-family:'DM Mono',monospace;font-size:12px;color:#fff;padding:0 28px;letter-spacing:.04em}
.ti span{opacity:.65;margin-right:6px}

header{padding:2rem 2rem 1rem;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;border-bottom:1px solid var(--bd)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,6vw,64px);letter-spacing:.02em;line-height:1}

.logo-sub{font-size:13px;color:var(--mu);margin-top:4px;letter-spacing:.06em;text-transform:uppercase}
.badge{display:inline-flex;align-items:center;gap:6px;background:var(--sur2);border:1px solid var(--bd2);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--mu)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--gr);animation:pu 2s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.lupd{font-size:11px;color:var(--mu);margin-top:6px;text-align:right}
nav{display:flex;gap:4px;padding:1rem 2rem 0;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.tb{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;padding:8px 18px 10px;border:none;background:transparent;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
.tb:hover{color:var(--tx)}.tb.on{color:var(--ac);border-bottom-color:var(--ac)}
main{padding:1.5rem 2rem;max-width:1100px;margin:0 auto}
.tp{display:none}.tp.on{display:block}
.sg{display:flex;flex-direction:column;gap:8px}
.sr{display:grid;grid-template-columns:44px 1fr auto auto;align-items:center;gap:12px;background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:14px 18px;cursor:pointer;transition:border-color .15s,background .15s}

.sn{font-size:17px;font-weight:600}.sm{font-size:12px;color:var(--mu);margin-top:2px}
.bw{height:6px;border-radius:3px;margin-top:6px;overflow:hidden;display:flex}
.bg{height:100%;background:#3a9e5f}
.br{height:100%;background:#c94040}

.th{width:30px;height:30px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--mu);flex-shrink:0;position:relative}

// ── NAME MATCHING ─────────────────────────────────────────────────────────────
// Build lookup: last name -> player (and full name normalized -> player)
const nameIndex = {};
TEAMS.forEach(t => t.players.forEach(p => {
  // Full name normalized
  const full = p.n.toLowerCase().replace(/[^a-z]/g,'');
  nameIndex[full] = p;
  // First + Last combined
  const parts = p.n.toLowerCase().split(' ').filter(Boolean);
  if (parts.length >= 2) {
    const firstLast = parts[0].replace(/[^a-z]/g,'') + parts[parts.length-1].replace(/[^a-z]/g,'');
    nameIndex[firstLast] = p;
  }
}));

function matchPlayer(espnName) {
  if (!espnName) return null;
  // Try full normalized name first (most reliable)
  const full = espnName.toLowerCase().replace(/[^a-z]/g,'');
  if (nameIndex[full]) return nameIndex[full];
  // Try first + last name combined (no last-name-only - too many false matches e.g. Terry Anderson -> Christian Anderson)
  const parts = espnName.toLowerCase().split(' ').filter(Boolean);
  const last = parts[parts.length-1].replace(/[^a-z]/g,'');
  if (parts.length >= 2) {
    const firstLast = parts[0].replace(/[^a-z]/g,'') + last;
    if (nameIndex[firstLast]) return nameIndex[firstLast];
  }
  // REMOVED: last-name-only matching - causes too many false positives
  return null;
}

  try { localStorage.setItem('moose-admin-overrides', JSON.stringify(adminOverrides)); } catch(_) {}
}

function getRoundForDate(dateStr) {
  const d = dateStr ? dateStr.substring(0, 10) : '';
  for (const [round, dates] of Object.entries(ROUND_DATES)) {
    if (dates.includes(d)) return round;
  }
  return null;
}

function normalizeSchool(s) {
  // Normalize curly/smart apostrophes to straight apostrophe (handles "St. John's" variants)
  return s.toLowerCase().trim().replace(/[\u2018\u2019\u201A\u201B\u2032]/g, "'");
}

function isEliminated(p) {
  const sl = normalizeSchool(p.s);
  // Never eliminate protected schools (avoid Tennessee State / Miami OH confusion)
  if (PROTECTED_SCHOOLS.includes(sl)) return false;
  // First Four losers never made the real tournament
  if (FIRST_FOUR_LOSERS.includes(sl)) return true;
  // Exact match against ESPN location field (e.g. "kansas", "duke", "texas a&m")
  return elimSchools.has(sl);
}

function getPlayerPts(p) {
  // Admin override takes priority over everything
  if (adminOverrides[p.n]) {
    return Object.values(adminOverrides[p.n]).reduce((s, v) => s + (parseInt(v) || 0), 0);
  }
  // Hardcoded First Four losers
  if (FIRST_FOUR_PTS[p.n] !== undefined) return FIRST_FOUR_PTS[p.n];
  return livePts[p.n] || 0;
}

function getPlayerRoundCols(p) {
  const cols = [null, null, null, null, null, null];
  // Admin override takes priority
  if (adminOverrides[p.n]) {
    Object.entries(adminOverrides[p.n]).forEach(([col, val]) => {
      cols[parseInt(col)] = parseInt(val) || 0;
    });
    return cols;
  }
  // Hardcoded First Four losers — R1 only, always eliminated
  if (FIRST_FOUR_PTS[p.n] !== undefined) {
    cols[0] = FIRST_FOUR_PTS[p.n];
    return cols;
  }
  // ESPN data
  const rounds = roundPts[p.n] || {};
  Object.entries(ROUND_TO_COL).forEach(([round, col]) => {
    if (rounds[round] !== undefined) cols[col] = rounds[round];
  });
  return cols;
}

function teamTotal(t) {
  return t.players.reduce((s, p) => s + getPlayerPts(p), 0);
}

// ── ESPN FETCH ────────────────────────────────────────────────────────────────
async function fetchAll() {
  try {
    // Step 1: fetch all tournament game IDs and their dates
    const allEvents = [];
    await Promise.all(TOURNEY_DATES.map(async d => {
      const url = `https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?groups=100&seasontype=3&limit=100&dates=${d.replace(/-/g,'')}&_=${Date.now()}`;
      try {
        const res = await fetch(url);
        if (!res.ok) return;
        const data = await res.json();
        (data.events || []).forEach(e => {
          // Use game START time in ET to determine date (avoids UTC midnight bleed)
          const rawDate = e.competitions?.[0]?.date || e.date || d;
          let gameDate;
          try {
            const dt = new Date(rawDate);
            // Convert UTC to ET (UTC-5 standard, UTC-4 daylight — March is DST so UTC-4)
            const ET_OFFSET_MS = 4 * 60 * 60 * 1000; // EDT = UTC-4
            const etMs = dt.getTime() - ET_OFFSET_MS;
            const etDate = new Date(etMs);
            const y = etDate.getUTCFullYear();
            const m = String(etDate.getUTCMonth() + 1).padStart(2, '0');
            const dd = String(etDate.getUTCDate()).padStart(2, '0');
            gameDate = `${y}-${m}-${dd}`;
          } catch(_) { gameDate = rawDate.substring(0, 10); }
          e._date = gameDate;
          allEvents.push(e);
        });
      } catch(e) {}
    }));

    // Deduplicate events by game ID (same game can appear in multiple date fetches)
    const seenIds = new Set();
    const uniqueEvents = allEvents.filter(g => {
      if (seenIds.has(g.id)) return false;
      seenIds.add(g.id);
      return true;
    });

    const newLivePts = {};
    const newRoundPts = {};
    const newElimSchools = new Set();
    const games = [];

    // Step 2: for each game, fetch box score and credit player points
    await Promise.all(uniqueEvents.map(async g => {
      const comp = (g.competitions || [])[0];
      if (!comp) return;

      const status = comp.status?.type?.name || '';
      const isFinal = status === 'STATUS_FINAL';
      const isLive = status === 'STATUS_IN_PROGRESS';

      // Always add to games list for scores tab
      games.push(g);

      // Track eliminations: for each final game, mark the loser
      if (isFinal) {
        (comp.competitors || []).forEach(team => {
          if (!team.winner) {
            const t = team.team || {};
            // Add multiple name variants so roster school names match
            [t.location, t.name, t.shortDisplayName, t.abbreviation]
              .filter(Boolean)
              .forEach(n => {
                const norm = n.toLowerCase().trim().replace(/[\u2018\u2019\u201A\u201B\u2032]/g, "'");
                newElimSchools.add(norm);
              });
          }
        });
      }

      // Only fetch box scores for live or completed games
      if (!isFinal && !isLive) return;

      const round = getRoundForDate(g._date);
      if (!round) return; // skip if we don't know the round

      try {
        const burl = `https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/summary?event=${g.id}&_=${Date.now()}`;
        const bres = await fetch(burl);
        if (!bres.ok) return;
        const bdata = await bres.json();

        (bdata.boxscore?.players || []).forEach(teamSection => {
          (teamSection.statistics || []).forEach(statGroup => {
            (statGroup.athletes || []).forEach(ath => {
              const player = matchPlayer(ath.athlete?.displayName);
              if (!player) return;
              const stats = ath.stats || [];
              const pts = parseInt(stats[1]) || 0;
              // Credit points — all players in box score get their points (0 if they didn't score)
              newLivePts[player.n] = (newLivePts[player.n] || 0) + pts;
              if (!newRoundPts[player.n]) newRoundPts[player.n] = {};
              newRoundPts[player.n][round] = (newRoundPts[player.n][round] || 0) + pts;
            });
          });
        });
      } catch(e) {}
    }));

    livePts = newLivePts;
    roundPts = newRoundPts;
    elimSchools = newElimSchools;
    liveGames = games;

    document.getElementById('lupd').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('lupd').textContent = 'Error: ' + e.message;
  }
  renderAll();
}

function img(id) {

}
function ini(n) { return n.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join(''); }
function avt(p, sz=34, showX=false) {
  const u = img(p.id);
  const initials = ini(p.n);
  const xOverlay = showX ? `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(180,0,0,0.65);font-size:${Math.round(sz*0.45)}px;font-weight:900;color:#fff;pointer-events:none;">✕</div>` : '';
  const imgTag = u ? `<img src="${u}" loading="lazy" style="width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"/>` : '';
  const iniDiv = `<div style="display:${u?'none':'flex'};width:100%;height:100%;border-radius:50%;background:#334;align-items:center;justify-content:center;font-size:${Math.round(sz*0.38)}px;font-weight:700;color:#8af;">${initials}</div>`;
  return `<div class="av" style="width:${sz}px;height:${sz}px;position:relative;flex-shrink:0;">${imgTag}${iniDiv}${xOverlay}</div>`;
}

function renderScores() {
  if (!liveGames.length) {
    document.getElementById('tab-scores').innerHTML = '<p style="color:var(--mu);padding:2rem 0">No games loaded yet.</p>';
    return;
  }
  const fin=[],live=[],up=[];
  liveGames.forEach(item => {
    const g = item.g || item;
    const st = g.status?.type?.name;
    const state = g.status?.type?.state;
    if (st==='STATUS_FINAL') fin.push(g);
    else if (st==='STATUS_IN_PROGRESS' || st==='STATUS_HALFTIME' || state==='in') live.push(g);
    else up.push(g);
  });

  // Sort upcoming: earliest date/time first, TBD last
  up.sort((a, b) => {
    const da = a.date || a.competitions?.[0]?.date || '';
    const db = b.date || b.competitions?.[0]?.date || '';
    if (!da && !db) return 0;
    if (!da) return 1;  // TBD goes last
    if (!db) return -1;
    return da < db ? -1 : da > db ? 1 : 0;
  });

  // Sort finals: most recent first
  fin.sort((a, b) => {
    const da = a.date || a.competitions?.[0]?.date || '';
    const db = b.date || b.competitions?.[0]?.date || '';
    return da > db ? -1 : da < db ? 1 : 0;
  });

  function gh(g) {
    const c = g.competitions?.[0]; if(!c) return '';
    const teams = c.competitors||[];
    const st = g.status?.type?.name;
    const state = g.status?.type?.state;
    const isFin = st==='STATUS_FINAL';
    const isHalf = st==='STATUS_HALFTIME';
    const isLive = st==='STATUS_IN_PROGRESS' || isHalf || state==='in';
    const stText = isHalf ? 'Halftime' : g.status?.type?.shortDetail||'';
    const win = isFin ? teams.find(t=>t.winner) : null;
    return `<div class="gc">
      <div class="gch"><span class="gcr">${g.shortName||g.name||'Game'}</span><span class="${isFin?'gf':isLive?'gl':'gu'}">${isFin?'Final':isLive?'● '+stText:stText}</span></div>
      ${teams.map(t=>{const w=win&&t.id===win.id;return`<div class="gt"><div class="tl ${isFin&&!w?'lo':''}">${t.team?.displayName||t.team?.name||''}</div><div class="ts ${isFin&&!w?'lo':''}">${t.score||'–'}</div></div>`;}).join('')}
    </div>`;
  }
  let h='';
  if(live.length) h+=`<div class="sl">Live Now</div><div class="scg">${live.map(gh).join('')}</div>`;
  if(up.length) h+=`<div class="sl">Upcoming</div><div class="scg">${up.map(gh).join('')}</div>`;
  if(fin.length) h+=`<div class="sl">Final</div><div class="scg">${fin.map(gh).join('')}</div>`;
  document.getElementById('tab-scores').innerHTML = h;
}

  }).join('');

  el.innerHTML = `
    <div style="padding:0 0 80px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
        <div style="font-size:18px;font-weight:700">⚙️ Admin — Score Overrides</div>
        <div style="display:flex;gap:8px;align-items:center">
          <button onclick="adminShowEdited=!adminShowEdited;renderAdmin()"
            style="font-size:12px;padding:5px 12px;border-radius:8px;background:${adminShowEdited?'var(--ac)':'var(--sur2)'};border:1px solid ${adminShowEdited?'var(--ac)':'var(--bd2)'};color:${adminShowEdited?'#fff':'var(--fg)'};cursor:pointer">
            ✏️ Edited
          </button>
          <button onclick="adminLock()"
            style="font-size:12px;padding:5px 12px;border-radius:8px;background:var(--sur2);border:1px solid var(--bd2);color:var(--mu);cursor:pointer">
            Lock
          </button>
        </div>
      </div>
      <div style="color:var(--mu);font-size:12px;margin-bottom:14px">
        Enter a value to override ESPN data for that round. Leave blank to use ESPN data. Tap ✏️ Edited to filter to overridden players only.
      </div>
      <input id="admin-search" type="text" placeholder="🔍 Search player or school..."
        style="width:100%;box-sizing:border-box;padding:10px 14px;border-radius:10px;border:1px solid var(--bd2);background:var(--sur);color:var(--fg);font-size:14px;margin-bottom:16px"
        oninput="renderAdmin()">
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead>
            <tr style="color:var(--mu);font-size:11px;border-bottom:1px solid var(--bd2)">
              <th style="text-align:left;padding:6px 6px;font-weight:600">PLAYER</th>
              <th style="padding:6px 3px">R1</th>
              <th style="padding:6px 3px">R2</th>
              <th style="padding:6px 3px">R3</th>
              <th style="padding:6px 3px">R4</th>
              <th style="padding:6px 3px">R5</th>
              <th style="padding:6px 3px">R6</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;

  // Restore search focus
  const si = document.getElementById('admin-search');
  if (si && search) { si.value = search; si.setSelectionRange(search.length, search.length); }
}

function getPlayerRoundColsESPN(p) {
  // Raw ESPN data without overrides — for showing as placeholder
  const cols = [null, null, null, null, null, null];
  const rounds = roundPts[p.n] || {};
  Object.entries(ROUND_TO_COL).forEach(([round, col]) => {
    if (rounds[round] !== undefined) cols[col] = rounds[round];
  });
  return cols;
}

function adminLogin() {
  const pw = document.getElementById('admin-pw')?.value || '';
  if (pw === ADMIN_PASSWORD) {
    adminUnlocked = true;
    renderAdmin();
  } else {
    document.getElementById('admin-err').textContent = 'Incorrect password. Try again.';
  }
}

function adminLock() {
  adminUnlocked = false;
  renderAdmin();
}

async function adminSetPts(playerName, colIndex, value) {
  const val = value.trim();
  if (!adminOverrides[playerName]) adminOverrides[playerName] = {};
  if (val === '' || val === null) {
    delete adminOverrides[playerName][colIndex];
    if (Object.keys(adminOverrides[playerName]).length === 0) delete adminOverrides[playerName];
  } else {
    adminOverrides[playerName][colIndex] = parseInt(val) || 0;
  }
  await saveOverrides();
  // Re-render all tabs to reflect the change
  if (curTab === 'admin') renderAdmin();
  else renderAll();
}

async function adminClear(playerName) {
  delete adminOverrides[playerName];
  await saveOverrides();
  renderAdmin();
}



// ── INIT ──────────────────────────────────────────────────────────────────────
async function manualRefresh() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = '↻ Refreshing...';
  btn.style.opacity = '0.5';
  await fetchAll();
  btn.textContent = '↻ Refresh';
  btn.style.opacity = '1';
}
// Load overrides first, then render and start fetching
(async () => {
  await loadOverrides();
  renderAll();
  fetchAll();
  setInterval(fetchAll, 30000);
})();
</script>
</body>
</html>
